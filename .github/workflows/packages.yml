name: MSYS2 PKGBUILD CI

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '.vscode/**'
      - '.devcontainer/**'
  pull_request:

jobs:
  detect-directory-changes:
    name: "Detect Directory Changes"
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Detect Directory Changes
        id: detect
        uses: tchupp/actions-detect-directory-changes@v1
        with:
          included-paths: "!./.github/**"
  build-pkg:
    runs-on: windows-11-arm
    needs: [detect-directory-changes]
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.detect-directory-changes.outputs.changed) }}
    steps:
    - uses: actions/checkout@v5
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANGARM64
        update: true
        install:
            git
            make
            patch
            patchutils
        pacboy:
            toolchain:a
            gcc-compat:a
            cmake:a
            diffutils:a
    - name: makepkg-mingw
      working-directory: ./${{ matrix.project }}
      shell: msys2 {0}
      run: |
        # makepkg-mingw on project directory: ${{ matrix.project }}
        makepkg-mingw --cleanbuild --force --noconfirm --syncdeps --skippgpcheck
    - name: '📤 Upload artifact: package'
      uses: actions/upload-artifact@v6
      with:
        name: ${{ matrix.project }}-aarch64
        path: ./${{ matrix.project }}/*.zst
  release:
    name: Release
    needs: [build-pkg]
    # if: github.event_name != 'pull_request' && startswith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Get build number
      run: |
        echo "BUILD_NUMBER=$(git describe --abbrev=7 --dirty --always --tags)" >> $GITHUB_ENV
    - name: Prepare release directory
      run: |
        mkdir -p release
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: release
    - name: Zip directories
      run: |
        cd release
        for f in *; do
          if [ -d "$f" ]; then
            cd $f
            echo "Compressing $f"
            zip -r $f.zip *
            mv $f.zip ../
            cd ..
          fi
        done
    - name: Create release
      run: |
        gh release create ${{ github.ref_name }} ./release/*.zip \
          --title "${{ env.NAME_UPPER }} ${{ github.ref_name }}" \
          --draft \
          --generate-notes
      env:
        GITHUB_TOKEN: ${{ github.TOKEN }}
