name: MSYS2 PKGBUILD CI

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '.vscode/**'
      - '.devcontainer/**'
  pull_request:

jobs:
  detect-directory-changes:
    name: "Detect Directory Changes"
    runs-on: ubuntu-latest
    environment: env
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Detect Directory Changes
        id: detect
        uses: tchupp/actions-detect-directory-changes@v1
        with:
          included-paths: "!./.github/**"
  setup-msys2:
    name: "Setup MSYS2 environment"
    runs-on: windows-11-arm
    environment: env
    steps:
    - uses: actions/checkout@v5
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANGARM64
        update: true
        install:
            gnupg
            # git
            # make
            # patch
            # patchutils
        pacboy:
            # toolchain:a
            # gcc-compat:a
            # cmake:a
            # diffutils:a
            gnupg:a
  update-gpg-keys:
    name: Update GPG Keys
    runs-on: windows-11-arm
    environment: env
    needs: [setup-msys2]
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Import GPG Keys
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "${{ secrets.GPG_FINGERPRINT }}:6:" | gpg --batch --import-ownertrust

