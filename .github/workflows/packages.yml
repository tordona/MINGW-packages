name: MINGW PACKAGES PKGBUILD CI

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '.vscode/**'
      - '.devcontainer/**'
  pull_request:

jobs:
  detect-directory-changes:
    name: '🕵 Detect Directory Changes'
    runs-on: ubuntu-latest
    environment: env
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: '🛒 Checkout'
        uses: actions/checkout@v5
      - name: '🕵 Detect Directory Changes'
        id: detect
        uses: tchupp/actions-detect-directory-changes@v1
        with:
          included-paths: '!./.github/**'
  build-packages:
      name: '⚒️ Build ${{ matrix.project }}'
      runs-on: windows-11-arm
      environment: env
      needs: [detect-directory-changes]
      strategy:
        fail-fast: false
        matrix:
          project: ${{ fromJSON(needs.detect-directory-changes.outputs.changed) }}
      defaults:
        run:
          shell: msys2 {0}
          working-directory: ./${{ matrix.project }}
      steps:
      - name: '🛒 Checkout'
        uses: actions/checkout@v5
      - name: '🖥️ Get number of CPU cores'
        uses: SimenB/github-actions-cpu-cores@v2
        id: cpu-cores
      - name: '🔧 Setup MSYS2'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install:
              git
              make
              patch
              patchutils
          pacboy:
              gcc-compat:a
              cmake:a
              diffutils:a
      - name: '🔩 Update Packager Meta'
        run: |
          if test -f "/etc/makepkg_mingw.conf"; then
            sed -i 's/#PACKAGER="John Doe <john@doe.com>"/PACKAGER="CI (${{ github.repository_owner }}\/${{ github.triggering_actor }}\/${{ github.run_id }})"/' /etc/makepkg_mingw.conf
          fi
      - name: '📦 Run makepkg-mingw on PKGBUILD'
        run: |
          # set parallel worker count
          export CMAKE_BUILD_PARALLEL_LEVEL=${{ steps.cpu-cores.outputs.count }}
          MAKEFLAGS="-j${{ steps.cpu-cores.outputs.count }}"
          
          # makepkg-mingw on project directory: ${{ matrix.project }}
          makepkg-mingw --cleanbuild --force --noconfirm --syncdeps --skippgpcheck
      - name: '📩 Import GPG Key'
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "${{ secrets.GPG_FINGERPRINT }}:6:" | gpg --batch --import-ownertrust
      - name: '🔏 GPG Detach Sign: package'
        run: |
          for pkg in *.zst; do
            echo $pkg;
            gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --output "$pkg.sig" \
            --detach-sig "$pkg"
          done
      - name: '🗜️ 7Zip Archive Sources'
        run: |
          # archive and make available sources directly related to this package
          # pull version properties and reconstitute filename
          source ./PKGBUILD
          prefix=""
          if [[ -n $epoch ]]; then
            prefix="$epoch~"
          fi
          version="$prefix$pkgver.$pkgrel"
          compiler="clang"
          arch="aarch64"
          filename=${{ matrix.project }}
          filename=${filename/mingw-w64/mingw-w64-$compiler-$arch}

          pacman -S mingw-w64-clang-aarch64-7zip --noconfirm

          7z a $filename-$version-any.pkg.src.7z * -x!*.zst -x!*.sig -x!*/
      - name: '📤 Upload artifact: package'
        uses: actions/upload-artifact@v6
        with: 
          name: ${{ matrix.project }}-aarch64
          path: |
            ./${{ matrix.project }}/*.zst
            ./${{ matrix.project }}/*.zst.sig
            ./${{ matrix.project }}/*.src.7z
  cleanup:
    if: ${{ github.ref_name != 'master' }}
    name: '🧹 Clean Up Deployment Log'
    runs-on: ubuntu-latest
    needs: [build-packages]
    permissions: write-all
    steps:
      - name: '🗑 Delete Deployment'
        uses: strumwolf/delete-deployment-environment@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: env
          onlyRemoveDeployments: true
  release-separate-rackages:
    name: '🚚 Release Separate Packages'
    needs: [detect-directory-changes, build-packages, cleanup]
    environment: env
    # if: github.event_name != 'pull_request' && startswith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.detect-directory-changes.outputs.changed) }}
    steps:
    - uses: hmarr/debug-action@v3
    - name: '🛒 Checkout'
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: '📝 Prepare Release Directory'
      run: |
        mkdir -p release
    - name: '📩 Download Artifacts'
      uses: actions/download-artifact@v4
      with:
        path: release
    - name: '🔍 Check Package Release Exists'
      id: check-package-release-exists
      uses: insightsengineering/release-existence-action@v1.0.0
      with:
        release-tag: "${{ matrix.project }}"
    - name: '📤 Upload to Existing Package Release'
      if: steps.check-package-release-exists.outputs.release-exists == 'true' 
      run: |
          gh release upload "${{ matrix.project }}" \
            './release/${{ matrix.project }}-*/*.zst' \
            './release/${{ matrix.project }}-*/*.sig' \
            './release/${{ matrix.project }}-*/*.7z' \
            --clobber
      env:
        GITHUB_TOKEN: ${{ github.TOKEN }}
    - name: '🔨 Create New Package Release'
      if: steps.check-package-release-exists.outputs.release-exists == 'false' 
      run: |
          gh release create "${{ matrix.project }}" \
            './release/${{ matrix.project }}-*/*.zst' \
            './release/${{ matrix.project }}-*/*.sig' \
            './release/${{ matrix.project }}-*/*.7z' \
            --title ${{ matrix.project }} \
            --notes 'Package Sources are in `*.src.7z`'
      env:
        GITHUB_TOKEN: ${{ github.TOKEN }}
  release-architecture-packages:
    name: '🚚 Release Architecture Packages'
    needs: [detect-directory-changes, build-packages, cleanup]
    environment: env
    # if: github.event_name != 'pull_request' && startswith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.detect-directory-changes.outputs.changed) }}
        arch: ['clang-aarch64']
    steps:
    - uses: hmarr/debug-action@v3
    - name: '🛒 Checkout'
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: '📝 Prepare Release Directory'
      run: |
        mkdir -p release
    - name: '📩 Download Artifacts'
      uses: actions/download-artifact@v4
      with:
        path: release
    - name: '🔍 Check Architecture Release Exists'
      id: check-architecture-release-exists
      uses: insightsengineering/release-existence-action@v1.0.0
      with:
        release-tag: "${{ matrix.arch }}"
    - name: '🧾 Create List of Older Assets to Delete'
      id: 'deletable-assets'
      if: steps.check-architecture-release-exists.outputs.release-exists == 'true' 
      run: |
        declare -a asset_blob
        shopt -s extglob
        regex="^(.*)-[0-9]+[.~]"
        directory="./release/${{ matrix.project }}-*/*"
        for file in $directory; do
          filename=$(basename "${file}")
          if [[ -f "$file" && "$filename" =~ $regex ]]; then
            asset_blob+=(filepattern=${BASH_REMATCH[1]}*.${filename##*.})
          fi
        done
        echo $asset_blob
        echo "assets=asset_blob" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ github.token }}
    - name: '🗑️ Delete Older Packages From Existing Architecture Release'
      # uses: mknejp/delete-release-assets@v1
      # with:
      #   token: ${{ github.token }}
      #   tag: ${{ matrix.arch }}
      run: |
        echo ${${{ steps.deletable-assets.outputs.assets }}}
        IFS=$'\n'
        multiline_asset_list="${${{ steps.deletable-assets.outputs.assets }}[*]}"
        echo $multiline_asset_list
    - name: '📤 Upload to Existing Architecture Release'
      if: steps.check-architecture-release-exists.outputs.release-exists == 'true' 
      run: |
          gh release upload "${{ matrix.arch }}" \
            './release/${{ matrix.project }}-*/*.zst' \
            './release/${{ matrix.project }}-*/*.sig' \
            --clobber
      env:
        GITHUB_TOKEN: ${{ github.TOKEN }}
    - name: '🔨 Create New Architecture Package Release'
      if: steps.check-architecture-release-exists.outputs.release-exists == 'false' 
      run: |
          gh release create "${{ matrix.arch }}" \
            './release/${{ matrix.project }}-*/*.zst' \
            './release/${{ matrix.project }}-*/*.sig' \
            --title ${{ matrix.arch }} \
            --notes 'Test Notes'
      env:
        GITHUB_TOKEN: ${{ github.TOKEN }}
