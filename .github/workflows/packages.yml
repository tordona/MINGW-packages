name: MSYS2 PKGBUILD CI

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '.vscode/**'
      - '.devcontainer/**'
  pull_request:

jobs:
  detect-directory-changes:
    name: '🕵 Detect Directory Changes'
    runs-on: ubuntu-latest
    environment: env
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Detect Directory Changes
        id: detect
        uses: tchupp/actions-detect-directory-changes@v1
        with:
          included-paths: '!./.github/**'
  build-packages:
      name: '⚒️ Build ${{ matrix.project }}'
      runs-on: windows-11-arm
      environment: env
      needs: [detect-directory-changes]
      strategy:
        fail-fast: false
        matrix:
          project: ${{ fromJSON(needs.detect-directory-changes.outputs.changed) }}
      steps:
      - uses: actions/checkout@v5
      - name: '🖥️ Get number of CPU cores'
        uses: SimenB/github-actions-cpu-cores@v2
        id: cpu-cores
      - name: '🔧 Setup MSYS2'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install:
              git
              make
              patch
              patchutils
          pacboy:
              gcc-compat:a
              cmake:a
              diffutils:a
      - name: '📦 Run makepkg-mingw on PKGBUILD'
        shell: msys2 {0}
        working-directory: ./${{ matrix.project }}
        run: |
          # set parallel worker count
          export CMAKE_BUILD_PARALLEL_LEVEL=${{ steps.cpu-cores.outputs.count }}
          MAKEFLAGS="-j${{ steps.cpu-cores.outputs.count }}"
          # makepkg-mingw on project directory: ${{ matrix.project }}
          makepkg-mingw --cleanbuild --force --noconfirm --syncdeps --skippgpcheck
      - name: '📩 Import GPG Key'
        shell: msys2 {0}
        working-directory: ./${{ matrix.project }}
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "${{ secrets.GPG_FINGERPRINT }}:6:" | gpg --batch --import-ownertrust
      - name: '🔏 GPG Detach Sign: package'
        shell: msys2 {0}
        working-directory: ./${{ matrix.project }}
        run: |
          for pkg in *.zst; do
            echo $pkg;
            gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --output "$pkg.sig" \
            --detach-sig "$pkg"
          done
      - name: '📤 Upload artifact: package'
        uses: actions/upload-artifact@v6
        with: 
          name: ${{ matrix.project }}-aarch64
          path: |
            ./${{ matrix.project }}/*.zst
            ./${{ matrix.project }}/*.zst.sig
      # - name: '🚚 Create Package Release'
      #   shell: msys2 {0}
      #   run: |
      #     pacman -S --noconfirm mingw-w64-clang-aarch64-github-cli
      #     gh release create "${{ matrix.project }}" \
      #       "./${{ matrix.project }}/*.zst" \
      #       "./${{ matrix.project }}/*.sig" \
      #       --title "${{ matrix.project }}" \
      #       --draft \
      #       --generate-notes
      #   env:
      #     GITHUB_TOKEN: ${{ github.TOKEN }}
  # cleanup:
  #   name: '🧹 Clean up deployment log'
  #   runs-on: ubuntu-latest
  #   needs: [build-packages]
  #   permissions: write-all
  #   steps:
  #     - name: 🗑 Delete deployment
  #       uses: strumwolf/delete-deployment-environment@v2
  #       with:
  #         token: ${{ secrets.GITHUB_TOKEN }}
  #         environment: env
  #         onlyRemoveDeployments: true
  release:
    name: '🚚 Release'
    needs: [detect-directory-changes, build-packages]
    environment: env
    # if: github.event_name != 'pull_request' && startswith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.detect-directory-changes.outputs.changed) }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Generate dated tag name
      id: generate_tag
      run: |
        # TAG_NAME="release-$(date +'%Y-%m-%d-%H%M%S')"        
        TAG_NAME="release-${{ github.run_number }}"
        echo "Generated tag name: $TAG_NAME"

        # Set the tag name as an output variable for subsequent steps
        echo "new_tag=$TAG_NAME" >> $GITHUB_ENV
    - name: Create and push the new tag
      uses: rickstaa/action-create-tag@v1
      with:
        tag_exists_error: false
        tag: ${{ matrix.project }}
        message: 'Automated release tag: ${{ matrix.project }}'
        github_token: ${{ secrets.GITHUB_TOKEN }}
    - name: Prepare release directory
      run: |
        mkdir -p release
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: release
    - name: Create release
      run: |
        ls -la
        cd ${{ matrix.project }} 
        ls -la
        cd ..
        cd release
        ls -la
        # gh release create ${{ matrix.project }} \
        #   './${{ matrix.project }}/*.zst' \
        #   './${{ matrix.project }}/*.sig' \
        #   --title ${{ matrix.project }} \
        #   --draft \
        #   --generate-notes
      env:
        GITHUB_TOKEN: ${{ github.TOKEN }}
